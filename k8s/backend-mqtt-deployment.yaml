   startupProbe:
          exec:
            command: ["cat", "/tmp/mqtt-healthy"]
          initialDelaySeconds: 15
          failureThreshold: 60 
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["cat", "/tmp/mqtt-healthy"]
          initialDelaySeconds: 30
          periodSeconds: 60
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          exec:
            command: ["cat", "/tmp/mqtt-healthy"]
          initialDelaySeconds: 23
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"       
