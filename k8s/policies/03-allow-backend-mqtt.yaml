---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {} # HARMLESS WILDCARD
  egress:
  # 1. THE "GKE INFRA" OVERRIDE
  # We are whitelisting the entire 10.0.0.0/8 for EGRESS. 
  # This is usually "taboo," but GKE uses this for the Node -> NAT Gateway path.
  - to:
    - ipBlock:
        cidr: 10.0.0.0/8  # Allow GKE Internal Routing
    - ipBlock:
        cidr: 169.254.169.254/32 # Metadata
  
  # 2. INTERNAL APPS
  - to:
    - podSelector:
        matchLabels:
          app: darkseek-db
    - podSelector:
        matchLabels:
          app: darkseek-redis

  # 3. THE PUBLIC INTERNET (MQTT BROKER)
  # REMOVE THE EXCEPTIONS. If it's timing out, let's go Nuclear.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 1883
    - protocol: TCP
      port: 8883
