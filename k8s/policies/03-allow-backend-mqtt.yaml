# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-frontend
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
  egress:
    # 1. DNS SURGICAL: Master IP (Templated)
    - to:
        - ipBlock:
            cidr: DNS_IP_PLACEHOLDER/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 2. DNS WIDE: Open Gate (Fail-safe for Port 53)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 3. EXTERNAL MQTT: Broker Traffic
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - protocol: TCP
          port: 8883
        - protocol: TCP
          port: 1883

    # 4. DATABASE: Surgical Entry
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db
      ports:
        - protocol: TCP
          port: 5432

    # 5. REDIS: Surgical Entry
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis
      ports:
        - protocol: TCP
          port: 6379

    # 6. INTERNAL MQTT: Self-Reference for ClusterIP Service
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-backend-mqtt
      ports:
        - protocol: TCP
          port: 1883
        - protocol: TCP
          port: 8883
