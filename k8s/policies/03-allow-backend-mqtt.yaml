---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    # --- FIXED INGRESS (Allow both WS and Frontend) ---
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-frontend

    - from:
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
  egress:
    # 1. DNS: Master IP (Surgical Entry 1)
    - to:
        - ipBlock:
            cidr: 34.118.224.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 2. DNS: NodeLocal IP (Surgical Entry 2 - THE FIX)
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # DNS RULE 3: Kube-DNS Namespace (The Label-based backup)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
 
    # 4. DNS: Fail-safe Open Gate (Port 53 to ALL)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 4. INTERNAL: Database (Postgres)
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db
      ports:
        - protocol: TCP
          port: 5432

    # 5. INTERNAL: Redis
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis
      ports:
        - protocol: TCP
          port: 6379

    # 6. EXTERNAL: MQTT Broker (The Tank)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - protocol: TCP
          port: 1883
        - protocol: TCP
          port: 8883
