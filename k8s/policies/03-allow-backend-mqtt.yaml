---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {} # Keep this open so Diagnostic/Frontend/WS can all talk to it
  egress:
    # --- DNS ENTRY 1: Kube-System Namespace ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- DNS ENTRY 2: NodeLocal DNS (IP ANCHOR) ---
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- INTERNAL INFRA: Redis & DB (SPECIFIC PODS, ALL PORTS) ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db

    # --- GKE METADATA SERVER ---
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80

    # --- EXTERNAL WORLD ---
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - protocol: TCP
          port: 1883
        - protocol: TCP
          port: 8883
        - protocol: TCP
          port: 443
