# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-frontend
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
  egress:
    # 1. DNS: Surgical IP Strike (Templated)
    # Rule 1: Master DNS (Placeholder)
    - to:
        - ipBlock:
            cidr: DNS_IP_PLACEHOLDER/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Rule 2: NodeLocal DNS (The 169.254 one)
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Rule 3: Internal VPC
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # 1b. DNS: Tank version (FAIL-SAFE for kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 2. External MQTT (Broker) - Port 8883 & 1883
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - protocol: TCP
          port: 8883
        - protocol: TCP
          port: 1883

    # 3. Internal Database & Redis
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis
      ports:
        - protocol: TCP
          port: 6379
