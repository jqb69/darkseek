---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-frontend
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
  egress:
    # --- DNS ENTRY 1: Master IP (UDP + TCP) ---
    - to:
        - ipBlock:
            cidr: 34.118.224.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- DNS ENTRY 2: NodeLocal IP (UDP + TCP - THE TRACE FIX) ---
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- DNS ENTRY 3: Namespace Selector (UDP + TCP) ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- GKE METADATA SERVER ---
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80

    # --- INTERNAL INFRA (DB + Redis) ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis
      ports:
        - protocol: TCP
          port: 6379

    # --- EXTERNAL BROKER & APIS ---
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - protocol: TCP
          port: 1883
        - protocol: TCP
          port: 8883
        - protocol: TCP
          port: 443
