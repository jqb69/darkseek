---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
  egress:
    # --- RULE 1: THE DNS CONSOLIDATION (Audit Trace 1-4) ---
    - to:
        - ipBlock:
            cidr: DNS_IP_PLACEHOLDER/32  # Used for Auditor Trace 4
        - ipBlock:
            cidr: 169.254.20.10/32      # Actual Pod DNS (Trace 3)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- RULE 2: INTERNAL DB (Unblocks Path to 5432) ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db

    # --- RULE 3: EXTERNAL MQTT BROKER ---
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]

    # --- RULE 4: INTERNAL REDIS (Unblocks Path to 6379) ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis

    # --- RULE 5: METADATA ---
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
