---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {} # Open ingress to internal pods to stop handshake drops
  egress:
    # 1. DNS: TOTAL KUBE-SYSTEM TRUST (The "Nuclear" DNS Fix)
    # This allows traffic to EVERY IP in kube-system, bypassing IP mismatch bugs.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 2. DNS: NODELOCAL (Keep as separate entry just in case)
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 3. INFRA: (Postgres & Redis)
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis

    # 4. EXTERNAL: THE OPEN GATE
    # We remove ALL 'except' and ALL 'ports' to stop Calico SYN drops.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
