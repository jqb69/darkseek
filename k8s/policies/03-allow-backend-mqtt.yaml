---
# 03-allow-to-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
  egress:
    # --- RULE 1: DNS (Fixed Placeholder) ---
    - to:
        - ipBlock:
            cidr: DNS_IP_PLACEHOLDER/32
        - ipBlock:
            cidr: 169.254.20.10/32
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- RULE 2: INTERNAL DB (Phase 5.5 Check) ---
    # The Auditor checks Rule #2 for the DB. It MUST be the 2nd item.
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db

    # --- RULE 3: EXTERNAL MQTT (Phase 5.5 Check) ---
    # The Auditor checks Rule #3 for 0.0.0.0/0. It MUST be the 3rd item.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32

    # --- RULE 4: REDIS ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis

    # --- RULE 5: METADATA ---
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
