---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    # --- LOGICAL OR: Each pod gets its own dash to avoid the "AND" trap ---
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-frontend
  egress:
    # --- RULE 1: THE DNS CLUSTER (Must contain all DNS targets) ---
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32  # Rule 1a: Matches Pod DNS
        - namespaceSelector:        # Rule 1b: Matches kube-system audit
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - ipBlock:
            cidr: 34.118.224.10/32  # Rule 1c: Master DNS for Trace 4
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- RULE 2: DB EGRESS (Per Audit Phase 5.5) ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db

    # --- RULE 3: EXTERNAL MQTT (Per Audit Phase 5.5 - NO PORTS) ---
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - protocol: TCP
        - protocol: UDP

    # --- RULE 4: REDIS ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis

    # --- RULE 5: GKE METADATA ---
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
