---
# 03-allow-to-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes:
  - Ingress
  - Egress
  
  # ✅ INGRESS: Allow WebSocket Backend to reach MQTT
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: darkseek-backend-ws
    ports:
    - protocol: TCP
      port: 8885
    - protocol: TCP
      port: 1883
  
  egress:
  # ---------------------------------------------------------
  # 1. DNS ACCESS (Split UDP/TCP for Stability)
  # ---------------------------------------------------------
  - to:
    - ipBlock:
        cidr: 169.254.20.10/32
    ports:
    - protocol: UDP
      port: 53
  - to:
    - ipBlock:
        cidr: 169.254.20.10/32
    ports:
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: 34.118.224.10/32
    ports:
    - protocol: UDP
      port: 53
  - to:
    - ipBlock:
        cidr: 34.118.224.10/32
    ports:
    - protocol: TCP
      port: 53

  # ---------------------------------------------------------
  # 2. EXTERNAL BROKER (All Ports: 1883, 8883, 8885, 443)
  # ---------------------------------------------------------
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 1883
    - protocol: TCP
      port: 8883
    - protocol: TCP
      port: 8885
    - protocol: TCP
      port: 443

  # ---------------------------------------------------------
  # 3. INTERNAL INFRASTRUCTURE (DB & Redis)
  # ---------------------------------------------------------
  - to:
    - podSelector:
        matchLabels:
          app: darkseek-db
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: darkseek-redis
    ports:
    - protocol: TCP
      port: 6379
