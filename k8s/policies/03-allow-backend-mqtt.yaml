---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt  # TARGETING THE ACTUAL WORKER
  policyTypes:
  - Ingress
  - Egress
  
  # --- INGRESS: ALLOW INTERNAL ---
  ingress:
  - from:
    - podSelector: {} # Allows frontend and debugger to talk to this pod

  # --- EGRESS: THE NUCLEAR MERGE ---
  egress:
  # This single rule replaces the lists for DNS, Redis, Postgres, and MQTT.
  # It grants this pod the same "Diplomatic Immunity" as your debug-mqtt pod.
  - {}
