---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    # --- FIX 1: Allow WS and Frontend to talk to MQTT ---
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
        - podSelector:
            matchLabels:
              app: darkseek-frontend
  egress:
    # --- FIX 2: DNS TRIPLE-STACK (Matches your Trace tool exactly) ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 34.118.224.10/32 # Master DNS (Restored for Trace)
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32 # NodeLocal DNS
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- INTERNAL INFRA (All ports to stop handshaking drops) ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db

    # --- THE EXTERNAL BROKER FIX (Gate is SHUT) ---
    # We remove 'except' and restrict ONLY by ports to bypass Calico's subtraction bug
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 1883
        - protocol: TCP
          port: 8883
        - protocol: TCP
          port: 443

    # --- METADATA SERVER ---
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
