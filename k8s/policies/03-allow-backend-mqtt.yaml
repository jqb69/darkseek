---
# k8s/policies/03-allow-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes: [Ingress, Egress]
  ingress:
    # --- LOGICAL OR: Each pod type gets its own entry ---
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-backend-ws
    - from:
        - podSelector:
            matchLabels:
              app: darkseek-frontend
  egress:
    # --- DNS 1: NodeLocal (UDP & TCP) ---
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # --- DNS 2: Master DNS (UDP & TCP) ---
    - to:
        - ipBlock:
            cidr: 34.118.224.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- DNS 3: Kube-System (UDP & TCP) ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # --- INTERNAL 1: Redis (ALL PORTS/PROTOCOLS) ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-redis

    # --- INTERNAL 2: DB (ALL PORTS/PROTOCOLS) ---
    - to:
        - podSelector:
            matchLabels:
              app: darkseek-db

    # --- EXTERNAL: The Broker (ALL PORTS, BOTH UDP & TCP) ---
    # Removed specific ports to stop the "Gate is SHUT" timeout
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - protocol: UDP
        - protocol: TCP

    # --- CLUSTER: GKE Metadata (Keep specific for security) ---
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
