---
# 03-allow-to-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-backend-mqtt
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-backend-mqtt
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: darkseek-backend-ws
    - podSelector: # ADD THIS: Allow the Spy Pod
        matchLabels:
          app: debug-mqtt
    ports:
    - protocol: TCP
      port: 1883
    - protocol: TCP
      port: 8883
    - protocol: TCP
      port: 8001
  
  egress:
  # --- TOP PRIORITY: DB & REDIS ---
  - to:
    - podSelector:
        matchLabels:
          app: darkseek-db
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: darkseek-redis
    ports:
    - protocol: TCP
      port: 6379
  # --- SECOND PRIORITY: EXTERNAL BROKER ---
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 1883
    - protocol: TCP
      port: 8883
    - protocol: TCP
      port: 8885
  # --- THIRD PRIORITY: DNS & METADATA ---
  - to:
    - ipBlock:
        cidr: 169.254.20.10/32
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: DNS_IP_PLACEHOLDER/32
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 80
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
