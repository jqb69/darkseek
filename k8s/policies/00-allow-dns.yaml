# k8s/policies/00-allow-dns.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-global
  namespace: default
spec:
  podSelector: {} # Targets every pod in the namespace
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      # REMOVE THE "to:" BLOCK ENTIRELY.
      # No "to" block = "Allow port 53 to ANY destination"
