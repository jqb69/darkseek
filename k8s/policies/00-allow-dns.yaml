# k8s/policies/00-allow-dns.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-global
  namespace: default
spec:
  podSelector: {} 
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: DNS_IP_PLACEHOLDER/32
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
