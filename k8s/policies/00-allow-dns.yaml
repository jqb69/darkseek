# k8s/policies/00-allow-dns.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-global
  namespace: default
spec:
  podSelector: {} 
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
    to:
    # ❌ ipBlock: DNS_IP_PLACEHOLDER/32 <--- THIS IS THE TRAP
    # ✅ DO THIS INSTEAD:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
