# k8s/policies/00-allow-dns.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-global
  namespace: default
spec:
  podSelector: {} 
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
    to:
    # 1. THE SNIPER: Match the specific IP (Inject via sed)
    - ipBlock:
        cidr: DNS_IP_PLACEHOLDER/32
    # 2. THE IDENTITY: Match the namespace (GKE Standard)
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    # 3. THE BACKUP: Match the pods directly (Standard K8s)
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
