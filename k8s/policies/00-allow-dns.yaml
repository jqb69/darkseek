---
#k8s/policies/00-allow-dns.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: default
spec:
  podSelector: {} # All pods
  policyTypes:
  - Egress
  egress:
  - to:
    # 1. By Namespace Label
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    # 2. By Pod Label (Targeting the DNS pods directly)
    - namespaceSelector: {} #
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    # 3. By Exact Service IP (REPLACE 10.0.0.10 with the result from Step 1)
    - ipBlock:
        cidr: 10.0.0.10/32 
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Metadata Server for GKE internals
  - to:
    - ipBlock:
        cidr: 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 80
  # External HTTPS for your API Keys (HuggingFace/Google)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
