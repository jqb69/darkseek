---
# k8s/policies/00-allow-dns.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-global
  namespace: default
spec:
  podSelector: {} # All pods in the namespace
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
    to:
    - ipBlock:
        cidr: DNS_IP_PLACEHOLDER/32  # This is the sniper rule
    - ipBlock:
        cidr: 0.0.0.0/0              # This is the fallback for safety (Port 53 ONLY)
