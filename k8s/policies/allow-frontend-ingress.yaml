---
# k8s/policies/allow-frontend-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0  # THIS is the explicit "From Anywhere" (Public Internet)
    ports:
    - protocol: TCP
      port: 8501
    - protocol: TCP
      port: 8443      
  egress:
  # 1. Internal Backend Only
  - to:
    - podSelector:
        matchLabels:
          app: darkseek-backend-ws
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8443

  # 2. DNS (The "Never-Fail" Version)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53  # Standard queries
    - protocol: TCP
      port: 53  # Large queries & Zone transfers
