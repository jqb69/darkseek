---
# k8s/policies/allow-frontend-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: darkseek-frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0  # THIS is the explicit "From Anywhere" (Public Internet)
    ports:
    - protocol: TCP
      port: 8501
    - protocol: TCP
      port: 8443      
