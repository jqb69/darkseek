# k8s/policies/06-allow-frontend-to-backend-mqtt.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mqtt-debug
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: debug-mqtt
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {} # Open Inbound
  egress:
  # 1. ALLOW DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # 2. ALLOW BROKER (Fixed structure)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0 # Or specific IP
    ports:
    - protocol: TCP
      port: 8885
    - protocol: TCP
      port: 8883
  # 3. ALLOW INTERNAL DB/REDIS
  - to:
    - podSelector:
        matchLabels:
          app: darkseek-db
    - podSelector:
        matchLabels:
          app: darkseek-redis
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
