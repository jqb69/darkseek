# k8s/06-allow-debug-to-backend.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mqtt-debug
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: debug-mqtt # ONLY for your debugger pod
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {} # Open Inbound
  egress:
  # 1. ALLOW DNS (Crucial for resolving Broker address)
  - to:
    - namespaceSelector: {} # Allow to kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # 2. ALLOW BROKER
  - to:
    - ports:
      - protocol: TCP
        port: 8885
  # 3. ALLOW INTERNAL DB/REDIS
  - to:
    - ports:
      - protocol: TCP
        port: 5432
      - protocol: TCP
        port: 6379
