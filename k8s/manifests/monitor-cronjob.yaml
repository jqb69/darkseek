---
#k8s/manifests/monitor-cronjob.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mqtt-monitor
  namespace: default
spec:
  schedule: "*/15 * * * *" # Runs every 15 mins
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          # FIX 1: Use the ServiceAccount we just created, NOT 'default'
          serviceAccountName: mqtt-monitor-sa 
          containers:
          - name: monitor
            image: bitnami/kubectl:latest
            env:
            - name: MQTT_BROKER_HOST
              valueFrom:
                secretKeyRef:
                  name: darkseek-secrets
                  key: MQTT_BROKER_HOST
            # FIX 2: Match the filename inside your ConfigMap
            command: ["/bin/bash", "/scripts/run-mqtt-tests.sh"] 
            volumeMounts:
            - name: script-vol
              mountPath: /scripts
          restartPolicy: OnFailure
          volumes:
          - name: script-vol
            configMap:
              name: mqtt-monitor-script
              defaultMode: 0755
