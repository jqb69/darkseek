---
#k8s/manifests/monitor-cronjob.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mqtt-monitor
  namespace: default
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: default # Must have 'edit' or 'patch' permissions!
          containers:
          - name: monitor
            image: bitnami/kubectl:latest
            env:
            - name: MQTT_BROKER_HOST
              valueFrom:
                secretKeyRef:
                  name: darkseek-secrets # <-- Your actual secret name
                  key: MQTT_BROKER_HOST
            command: ["/bin/bash", "/scripts/mqtt-testk8s.sh"]
            volumeMounts:
            - name: script-vol
              mountPath: /scripts
          restartPolicy: OnFailure
          volumes:
          - name: script-vol
            configMap:
              name: mqtt-monitor-script
              defaultMode: 0755
