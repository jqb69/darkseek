---
# k8s/manifests/monitor-rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitor-admin-binding
subjects:
- kind: ServiceAccount
  # FIX: Target the specific monitor, NOT the default account
  name: mqtt-monitor-sa 
  namespace: default
roleRef:
  kind: ClusterRole
  # 'edit' is a built-in K8s role. This gives the monitor 
  # full power to fix things across the cluster.
  name: edit 
  apiGroup: rbac.authorization.k8s.io
