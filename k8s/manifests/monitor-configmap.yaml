---
#k8s/manifests/monitor-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-monitor-script
  namespace: default
data:
  mqtt-testk8s.sh: |
    #!/bin/bash
    # k8s/mqtt-testk8s.sh
    TARGET_DB="darkseek-db"
    TARGET_REDIS="darkseek-redis"
    NAMESPACE="default"
    
    # 🩹 Surgery: Force Postgres to listen to the cluster
    patch_postgres() {
      echo "🔧 Patching Postgres Deployment..."
      kubectl -n "$NAMESPACE" patch deployment "$1" --type='json' \
        -p='[{"op":"add","path":"/spec/template/spec/containers/0/args","value":["-c","listen_addresses=0.0.0.0"]}]'
    }
    
    # 🩹 Surgery: Force Redis to drop protected mode
    patch_redis() {
      echo "🔧 Patching Redis Deployment..."
      kubectl -n "$NAMESPACE" patch deployment "$1" --type='json' \
        -p='[{"op":"replace","path":"/spec/template/spec/containers/0/command","value":["redis-server","--protected-mode","no","--bind","0.0.0.0"]}]'
    }
    
    tcp_check() {
      # Since you are using alpine/k8s, bash sockets are the most reliable
      timeout 2 bash -c "</dev/tcp/$1/$2" >/dev/null 2>&1
    }
    
    check_and_fix() {
      local service=$1 port=$2 type=$3
      echo "🧪 Probing $service:$port..."
      if ! tcp_check "$service" "$port"; then
        echo "🚨 REFUSED (111): $service is ignoring the cluster."
        [[ "$type" == "db" ]] && patch_postgres "$service" || patch_redis "$service"
        return 1
      fi
      echo "🟢 OK: $service is wide open."
    }
    
    check_and_fix "$TARGET_DB" 5432 db || true
    check_and_fix "$TARGET_REDIS" 6379 redis || true
