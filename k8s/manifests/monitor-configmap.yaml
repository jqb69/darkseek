---
#k8s/manifests/monitor-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: mqtt-monitor-script
  namespace: default
data: # <--- data must be at this level
  mqtt-testk8s.sh: | # <--- keys under data MUST be indented
    #!/bin/bash
    log() { echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] $*"; }
    
    check_net() {
      # This works in bash without needing any extra binaries
      (timeout 2 bash -c "</dev/tcp/darkseek-backend-ws/8000") >/dev/null 2>&1
    }

    recover() {
      log "🔎 Running deep-trace before acting..."
      
      # Check if it's a 'Refused' (App issue) or 'Timeout' (Network issue)
      # We use 'curl' here because it gives us specific error codes
      local status=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 http://darkseek-backend-ws:8000/health || echo "FAIL")
    
      if [[ "$status" == "000" ]]; then
        log "🚨 Network Timeout detected. Tickling policies..."
        # Only update a timestamp. Don't delete.
        kubectl annotate netpol --all darkseek/sync-tick=$(date +%s) --overwrite
      else
        log "⚠️ App is reachable but returned $status. Check App Binds/Logs, NOT NetworkPolicies."
      fi
    }
   
    log "🚀 Monitor Cycle Start"
    if check_net; then
      log "✅ Network OK"
    else
      recover
    fi
